<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Титанік: Прогноз Виживання</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; padding: 40px; text-align: center; color: #333; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; text-align: left; width: 350px; }
        h2 { text-align: center; color: #1e3c72; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: linear-gradient(to right, #1e3c72, #2a5298); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .result-box { margin-top: 25px; padding: 15px; border-radius: 6px; background-color: #f8f9fa; border-left: 5px solid #1e3c72; text-align: center; }
        .result-text { font-size: 18px; font-weight: bold; margin: 0 0 5px 0; }
        .prob-text { font-size: 14px; color: #666; margin: 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚢 Прогноз для Пасажира</h2>
        <form action="/predict" method="post">
            <div class="form-group">
                <label>Клас каюти (Pclass):</label>
                <select name="pclass">
                    <option value="1" {% if pclass == 1 %}selected{% endif %}>1 Клас (Люкс)</option>
                    <option value="2" {% if pclass == 2 %}selected{% endif %}>2 Клас (Бізнес)</option>
                    <option value="3" {% if pclass == 3 or pclass is not defined %}selected{% endif %}>3 Клас (Економ)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Стать:</label>
                <select name="sex">
                    <option value="1" {% if sex == 1 %}selected{% endif %}>Жіноча</option>
                    <option value="0" {% if sex == 0 or sex is not defined %}selected{% endif %}>Чоловіча</option>
                </select>
            </div>
            <div class="form-group">
                <label>Вік (років):</label>
                <input type="number" name="age" step="1" min="1" max="100" value="{{ age if age is defined else 22 }}" required>
            </div>
            <div class="form-group">
                <label>Ціна квитка (Fare):</label>
                <input type="number" name="fare" step="0.01" min="0" value="{{ fare if fare is defined else 7.25 }}" required>
            </div>
            <button type="submit">Розрахувати долю</button>
        </form>

        {% if prediction_text %}
            <div class="result-box">
                <p class="result-text">{{ prediction_text }}</p>
                <p class="prob-text">{{ probability_text }}</p>
            </div>
        {% endif %}
    </div>

</body>
</html>
